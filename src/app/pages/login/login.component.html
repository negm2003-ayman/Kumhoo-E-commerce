<section class="min-h-[calc(100vh-90px)] bg-[#f7f7f7] px-4 sm:px-6 lg:px-8 py-10 flex items-center justify-center">
  <div class="w-full max-w-xl bg-white rounded-4xl shadow-sm px-6 py-8 sm:px-10 sm:py-12 lg:px-14">

    <div class="mb-9 text-center sm:text-left">
      <p class="text-sm font-semibold uppercase tracking-[0.3em] text-amber-500">
        Welcome
      </p>

      <h1 class="mt-4 text-3xl sm:text-4xl lg:text-5xl font-bold text-[#111111]">
        Login to your account
      </h1>

      <p class="mt-4 text-gray-500 text-sm sm:text-base">
        Enter your details below to continue shopping.
      </p>
    </div>

    <form class="space-y-5">
      <div>
        <label class="block mb-2 text-sm font-semibold text-[#111111]">
          Username
        </label>
        <input
          type="text"
          placeholder="Enter your username"
          class="w-full h-13 rounded-2xl border border-gray-200 bg-white px-5 text-sm outline-none transition focus:border-amber-500 focus:ring-4 focus:ring-amber-100"
        />
      </div>

      <div>
        <label class="block mb-2 text-sm font-semibold text-[#111111]">
          Password
        </label>
        <input
          type="password"
          placeholder="Enter your password"
          class="w-full h-13 rounded-2xl border border-gray-200 bg-white px-5 text-sm outline-none transition focus:border-amber-500 focus:ring-4 focus:ring-amber-100"
        />
      </div>

      <div class="flex items-center justify-between gap-4 text-sm">
        <label class="flex items-center gap-2 text-gray-500">
          <input type="checkbox" class="accent-amber-500" />
          Remember me
        </label>

        <a class="text-amber-500 font-semibold hover:text-amber-600 cursor-pointer">
          Forgot password?
        </a>
      </div>

      <button
        type="submit"
        class="w-full h-13 rounded-2xl bg-black text-white font-semibold transition hover:bg-amber-500 hover:text-black"
      >
        Login
      </button>

      <p class="text-center text-sm text-gray-500">
        Don’t have an account?
        <span class="text-amber-500 font-semibold cursor-pointer">Create one</span>
      </p>
    </form>

  </div>
</section>
